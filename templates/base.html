    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- jQuery and Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root {
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --glass-bg: rgba(5, 12, 10, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #0d0e11 0%, #08090b 100%);
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            letter-spacing: -0.025em;
        }
        
        /* Sidebar styling */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(4, 10, 8, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.25rem;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            margin: 0.375rem 0;
            color: #9ca3af; /* gray-400 */
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.925rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .sidebar a:hover {
            color: #f3f4f6; /* gray-100 */
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(13, 148, 136, 0.15) 100%);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.25);
            box-shadow: 0 4px 20px -2px rgba(16, 185, 129, 0.15);
        }

        .sidebar svg {
            margin-right: 0.875rem;
            width: 1.25rem;
            height: 1.25rem;
            transition: transform 0.3s;
        }

        .sidebar a:hover svg {
            transform: scale(1.1);
        }

        .content {
            margin-left: 260px;
            padding: 2.5rem;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 2rem 0.5rem;
                align-items: center;
            }
            .sidebar h2 {
                display: none;
            }
            .sidebar a span {
                display: none;
            }
            .sidebar a {
                justify-content: center;
                width: 48px;
                height: 48px;
                padding: 0;
            }
            .sidebar svg {
                margin-right: 0;
            }
            .content {
                margin-left: 80px;
                width: calc(100% - 80px);
                padding: 1.5rem;
            }
        }

        /* Unified Dark Mode Select2 Styles */
        .select2-container--default .select2-selection--single {
            height: 42px;
            padding: 6px 12px;
            border: 1px solid #162e24 !important;
            border-radius: 0.375rem;
            background-color: #050c0a !important;
            color: #e5e7eb !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 28px;
            color: #e5e7eb !important;
        }

        .select2-search__field {
            color: #ffffff !important;
            background-color: #0c1a14 !important;
            border: 1px solid #162e24 !important;
            border-radius: 0.25rem;
            padding: 4px 8px !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 40px;
            right: 8px;
        }

        .select2-dropdown {
            background-color: #050c0a !important;
            color: #e5e7eb !important;
            border-color: #162e24 !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .select2-results__option {
            padding: 8px 12px;
            color: #d1d5db !important;
        }

        .select2-results__option--highlighted {
            background-color: #059669 !important;
            color: white !important;
        }

        .select2-results__option--selected {
            background-color: #022c22 !important;
            color: #34d399 !important;
        }

        .select2-container--default .select2-selection--multiple {
            background-color: #050c0a !important;
            border: 1px solid #162e24 !important;
            border-radius: 0.375rem;
            min-height: 42px;
            color: #e5e7eb !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #047857 !important;
            border: 1px solid #065f46 !important;
            color: white !important;
            border-radius: 0.25rem;
            padding: 2px 8px !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: white !important;
            margin-right: 0.375rem !important;
        }

        .select2-container--default .select2-search--inline .select2-search__field {
            color: #e5e7eb !important;
        }

        {% block style %}
        {% endblock style %}
    </style>
</head>
